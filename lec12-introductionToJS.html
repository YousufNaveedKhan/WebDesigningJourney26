<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lec12 - JS Introduction</title>
</head>
<body>
    
    <script>
        // Printing in console
        console.log("Hello World!");
        document.write("Hello World! <br>");
        console.log("Aptech Gulshan 2");
        document.write("Aptech Gulshan 2 <br>");

        // Variables
        // *String*
        var name = "Adan";
        console.log(name);
        document.write(name + "<br>");

        // *Integer (Int)*
        var age = 16;
        console.log(age);
        document.write(age + "<br>");

        // Concatenation 
        var stdName = "Huzaifa";
        console.log("Student Name: " + stdName);
        document.write("Student Name: " + stdName + "<br>");
    </script>
</body>
</html>
