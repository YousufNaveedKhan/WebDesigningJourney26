<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture08 - Layout in HTML</title>
    <style>
        h1{
            display: inline;
            border: 1px solid black;
        }
        u {
            display: block;
            border: 1px solid red;
        }
        i {
            display: block;
        }
    </style>
</head>
<body>
        <h1>
            Aptech Gulshan 2
        </h1>

        <i>Ibrahim</i>

        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Facere, iusto enim! Eaque facere, ad esse hic, necessitatibus doloremque nihil dolorem voluptates architecto corporis aliquam consectetur minima omnis reprehenderit provident ullam?</p>

        <b>Aptech</b>
        <i>Aptech</i>
        <u>Aptech</u>
</body>
</html>
