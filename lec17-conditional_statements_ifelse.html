<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lec17 - Conditional Statement (If Else)</title>
</head>
<body>
    
    <script>
        var opr = "/";

        if (opr == "+") {
            document.write("Jee bhai iske andar plus hai.")
        }else if (opr == "-") {
            document.write("Jee bhai iske andar minus hai")
        }else {
            document.write("Na plus hai or Na hi minus hai.")
        }
    </script>
</body>
</html>
