<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lec11 - Card Design</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100vh;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
            width: 300px;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 0 8px teal;
        }

        img {
            width: 100px;
            height: auto;
            border-radius: 50%;
        }

        .card h2 {
            margin: 10px 0;

        }

        .card p {
            color: grey;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            padding: 10px 15px;
            background-color: black;
            color: white;
            border-radius: 8px;
            transition: 0.5s ease;
        }

        .btn:hover {
            background-color: orange;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="images/img.jpg" alt="Picture">
        <h2>Arham</h2>
        <p>Web Designing</p>
        <p>I love web designing</p>

        <a href="#" class="btn">Contact Me</a>
    </div>
    <div class="card">
        <img src="images/user3.png" alt="Picture">
        <h2>Adan Ansari</h2>
        <p>Web Development</p>
        <p>I love web development</p>

        <a href="#" class="btn">Contact Me</a>
    </div>
    <div class="card">
        <img src="images/user2.png" alt="Picture">
        <h2>Ibrahim</h2>
        <p>Graphic Designing</p>
        <p>I love graphic designing</p>

        <a href="#" class="btn">Contact Me</a>
    </div>

</body>

</html>
