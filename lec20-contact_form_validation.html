<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lec20 - Contact Form Validations</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h2 {
            text-align: center;
        }

        .form-box {
            width: 300px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            animation: fadeIn 2s ease;
        }

        input,
        textarea {
            padding: 8px;
            width: 90%;
            margin: 10px 0;
            border-radius: 8px;
            border: .5px solid black;
        }

        .btn {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            background-color: black;
            color: white;
            border: none;
            transition: 0.6s ease;
            cursor: pointer;
        }

        .btn:hover {
            background-color: orange;
        }

        @keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

    </style>
</head>

<body>
    <div class="form-box">
        <form>
        <h2>Contact Form</h2>

        <input type="text" id="name" placeholder="Enter your name">
        <input type="email" id="email" placeholder="Enter your email">
        <textarea id="message" placeholder="Enter message here..."></textarea>
        <br>
        <button class="btn" type="submit" onclick="validateForm()">Submit</button>
        </form>
    </div>

    <script>

        function validateForm() {
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var message = document.getElementById('message').value; 

            if (name === "" || email === "" || message === "") {
                alert("Saari fields fill krdo bhai!");
            }else { 
                alert("Khush raho!")
            }
        }
    </script>
</body>

</html>
