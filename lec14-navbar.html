<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lec14 - Navbar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(45, 43, 43);
            color: white;
        }

        ul {
            display: flex;
            gap: 25px;
        }

        li {
            list-style: none;
        }

        li a {
            text-decoration: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        li a:hover {
            color: grey;
        }


        .logo {
            margin-left: 12px;
        }

        .logo h2 {
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logo h2:hover {
            color: rgb(202, 201, 201);
        }


        .btn {
            margin-right: 20px;
            padding: 10px;
            background-color: orangered;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: .5s ease;
        }

        .btn:hover {
            background-color: rgb(177, 48, 1);
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <h2>Aptech</h2>
        </div>

        <ul>
            <li>
                <a href="#">Home</a>
            </li>
            <li>
                <a href="#">About</a>
            </li>
            <li>
                <a href="#">Services</a>
            </li>
            <li>
                <a href="#">Contact</a>
            </li>
        </ul>

        <div class="btn">
            Register
        </div>
    </nav>
</body>

</html>
