<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture 08 - Grid</title>
    <style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
    }    

    .navbar {
        display: flex;
        justify-content: space-around;
        background-color: #333;
        padding: 15px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }

    .container {
        display: grid;
        grid-template-columns: 1fr 3fr;
        gap: 10px;
        padding: 30px;
    }

    .sidebar {
        background-color: #f4f4f4;
        padding: 20px;
    }

    .content {
        background-color: #ddd;
        padding: 20px;
    }

    .footer {
        background-color: black;
        color: white;
        text-align: center;
        padding: 15px;
    }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>This is a sidebar</p>
        </div>

        <div class="content">
            <h2>Content</h2>
            <p>This is a content</p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Aptech Gulshan 2</p>
    </div>
</body>
</html>
